services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8000/api/v1
    depends_on:
      - api

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
